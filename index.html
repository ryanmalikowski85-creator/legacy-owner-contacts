<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legacy Owner Resource Center Contacts</title>
  <style>
    :root { --brand:#1f2937; --accent:#111827; --bg:#f5f5f5; --card:#ffffff; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border-radius: 18px;
      padding: 32px 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,.12);
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.15;
      color: var(--brand);
    }
    .subtitle { font-size: 18px; margin: 0 0 24px; color: #444; }
    .button {
      display: inline-block;
      width: 100%;
      max-width: 320px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 20px;
      font-weight: bold;
      padding: 16px 20px;
      cursor: pointer;
      text-decoration: none;
    }
    .instructions {
      margin: 24px auto 0;
      text-align: left;
      max-width: 390px;
      font-size: 15px;
      line-height: 1.45;
      color: #333;
    }
    .instructions strong { color: #111; }
    .fallback { margin-top: 18px; font-size: 14px; color: #555; }
    .fallback a { color: #111827; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Legacy Owner Resource Center</h1>
    <p class="subtitle">Save our contact numbers directly to your phone.</p>

    <button class="button" onclick="downloadContacts()">Download Contacts</button>

    <div class="instructions">
      <p><strong>iPhone:</strong> After downloading, open the file and choose to add the contacts.</p>
      <p><strong>Android:</strong> After downloading, open the file and import the contacts.</p>
    </div>

    <p class="fallback">If the button does not work, <a href="LegacyOwnerResourceCenter-labeled.vcf" download>tap here instead</a>.</p>
  </main>

  <script>
    const vcfContent = `BEGIN:VCARD\r\nVERSION:3.0\r\nFN:Legacy Owner Services\r\nORG:Wyndham Owner Support\r\nTEL;TYPE=WORK,VOICE:(602) 203-8930\r\nEND:VCARD\r\n\r\nBEGIN:VCARD\r\nVERSION:3.0\r\nFN:Legacy Owner Onboarding\r\nORG:Wyndham Owner Support\r\nTEL;TYPE=WORK,VOICE:(602) 305-6327\r\nEND:VCARD\r\n\r\nBEGIN:VCARD\r\nVERSION:3.0\r\nFN:Club Wyndham Reservations\r\nORG:Wyndham Owner Support\r\nTEL;TYPE=WORK,VOICE:(800) 251-8736\r\nEND:VCARD\r\n\r\nBEGIN:VCARD\r\nVERSION:3.0\r\nFN:VIP Reservations\r\nORG:Wyndham Owner Support\r\nTEL;TYPE=WORK,VOICE:(888) 884-4321\r\nEND:VCARD\r\n`;

    function downloadContacts() {
      const blob = new Blob([vcfContent], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'LegacyOwnerResourceCenter-labeled.vcf';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
  </script>
</body>
</html>
